<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Intentify — Decode the real meaning behind messages</title>

<meta name="description" content="Analyze messages, emails and dating bios. Detect tone, intent, red flags and get smart replies.">

<meta name="keywords" content="message analyzer, dating message analyzer, text meaning analyzer, conversation analyzer">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0b1020;
color:white;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.subtitle{
color:#9aa4c9;
margin-bottom:30px;
}

textarea{
width:100%;
height:120px;
padding:15px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.decode{
background:#6d6dfc;
color:white;
}

.clear{
background:#444;
color:white;
}

.example{
background:#333;
color:white;
}

.results{
margin-top:30px;
padding:20px;
background:#141a34;
border-radius:10px;
}

.score{
font-size:20px;
margin-top:10px;
}

.reply{
margin-top:8px;
padding:10px;
background:#1d2448;
border-radius:6px;
}

.share{
margin-top:20px;
background:#00c4a7;
}

</style>

</head>

<body>

<div class="container">

<h1>Understand what they really mean.</h1>

<div class="subtitle">
Decode the real meaning behind messages, emails and dating bios.
</div>

<textarea id="input"></textarea>

<br>

<button class="decode" onclick="analyze()">Decode</button>
<button class="clear" onclick="clearText()">Clear</button>
<button class="example" onclick="randomExample()">Try random example</button>

<div class="results" id="results" style="display:none">

<div class="score" id="tone"></div>
<div class="score" id="interest"></div>
<div class="score" id="emotion"></div>
<div class="score" id="directness"></div>
<div class="score" id="clarity"></div>
<div class="score" id="confidence"></div>

<br>

<div id="meaning"></div>

<br>

<div id="patterns"></div>

<br>

<b>Suggested replies</b>

<div class="reply" id="reply1"></div>
<div class="reply" id="reply2"></div>
<div class="reply" id="reply3"></div>

<button class="share" onclick="share()">Copy share text</button>

</div>

</div>

<script>

const examples=[
"I'm really busy this week maybe another time",
"I had fun but I'm not sure I'm ready for something serious",
"I'll let you know",
"Let's see how I feel tomorrow",
"Maybe sometime next week",
"I like talking to you but I'm overwhelmed right now"
]

function randomExample(){
document.getElementById("input").value=
examples[Math.floor(Math.random()*examples.length)]
}

window.onload=randomExample

function clearText(){
document.getElementById("input").value=""
}

function analyze(){

let text=document.getElementById("input").value.toLowerCase()

let tone="Neutral"
let interest=50
let emotion="Neutral"
let directness="Medium"
let clarity="Medium"
let patterns=[]
let meaning=""

if(text.includes("maybe")){
interest-=15
patterns.push("avoidance language")
}

if(text.includes("busy")){
interest-=10
patterns.push("delay signal")
}

if(text.includes("not sure")){
interest-=15
patterns.push("uncertainty")
}

if(text.includes("another time")){
interest-=20
patterns.push("polite rejection")
}

if(text.includes("fun")){
interest+=10
emotion="Warm"
}

if(text.includes("overwhelmed")){
emotion="Defensive"
patterns.push("emotional pressure")
}

if(interest<30){
tone="Avoidant"
}

if(interest>70){
tone="Interested"
}

if(text.length<20){
clarity="Low"
}

if(text.includes("maybe")||text.includes("not sure")){
directness="Low"
}

let confidence=Math.floor(60+Math.random()*25)

meaning="The message suggests "

if(interest<30){
meaning+="low interest or polite distancing."
}

else if(interest<60){
meaning+="mixed signals or uncertainty."
}

else{
meaning+="positive engagement."
}

document.getElementById("tone").innerText="Tone: "+tone
document.getElementById("interest").innerText="Interest score: "+interest+"%"
document.getElementById("emotion").innerText="Emotion: "+emotion
document.getElementById("directness").innerText="Directness: "+directness
document.getElementById("clarity").innerText="Clarity: "+clarity
document.getElementById("confidence").innerText="Confidence: "+confidence+"%"

document.getElementById("meaning").innerText=meaning

document.getElementById("patterns").innerText="Detected patterns: "+patterns.join(", ")

document.getElementById("reply1").innerText="Friendly: No worries, let me know when you're free 🙂"
document.getElementById("reply2").innerText="Playful: Busy people are mysterious."
document.getElementById("reply3").innerText="Confident: Got it. If you're free another time let me know."

document.getElementById("results").style.display="block"

}

function share(){

let text=document.getElementById("input").value

let shareText=
"Intentify analysis\n\n"+
"Message: "+text+"\n\n"+
document.getElementById("interest").innerText+"\n"+
document.getElementById("tone").innerText+"\n"+
document.getElementById("confidence").innerText+"\n\n"+
"https://thedarkduke33.github.io/intentify/"

navigator.clipboard.writeText(shareText)

alert("Share text copied!")

}

</script>

</body>

</html>
